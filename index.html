<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Women's Day Jasmine</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ffb6c1,#ffd6e7,#ffe6f0);
font-family:'Quicksand',sans-serif;
text-align:center;
overflow:hidden;
}

/* message container */

.container{
padding:20px;
max-width:90%;
animation:fadeIn 2s ease;
}

/* main message */

h1{
font-family:'Pacifico',cursive;
color:#800020;
font-size:8vw;
line-height:1.4;
margin:0;
}

/* subtitle */

p{
color:#800020;
font-size:4vw;
margin-top:20px;
}

/* floating hearts */

.heart{
position:absolute;
bottom:-40px;
font-size:24px;
animation:floatUp linear infinite;
opacity:0.9;
}

/* sparkles */

.sparkle{
position:absolute;
font-size:18px;
color:white;
animation:twinkle 2s infinite ease-in-out;
}

/* animations */

@keyframes floatUp{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(-110vh);
opacity:0;
}
}

@keyframes twinkle{
0%,100%{opacity:0.2;transform:scale(1);}
50%{opacity:1;transform:scale(1.4);}
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

</style>
</head>

<body>

<div class="container">

<h1>
Happy Women's Day  
to the best girlfriend ever  
Jasmine ❤️❤️
</h1>

<p>You make every day better 💕</p>

</div>

<!-- hearts -->

<div class="heart" style="left:10%; animation-duration:6s;">❤️</div>
<div class="heart" style="left:30%; animation-duration:8s;">💗</div>
<div class="heart" style="left:50%; animation-duration:7s;">💖</div>
<div class="heart" style="left:70%; animation-duration:9s;">💞</div>
<div class="heart" style="left:90%; animation-duration:6s;">❤️</div>

<!-- sparkles -->

<div class="sparkle" style="top:15%; left:20%;">✨</div>
<div class="sparkle" style="top:30%; left:80%;">✨</div>
<div class="sparkle" style="top:60%; left:10%;">✨</div>
<div class="sparkle" style="top:70%; left:60%;">✨</div>

</body>
</html>
