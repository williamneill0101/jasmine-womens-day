<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Women's Day Jasmine</title>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      overflow: hidden;
      position: relative;
      background: linear-gradient(135deg, #ffb6c1, #ffd6e7, #ffe6f0);
      font-family: 'Quicksand', sans-serif;
      padding: 20px;
    }

    .container {
      position: relative;
      z-index: 5;
      max-width: 95%;
      animation: fadeIn 2s ease;
      padding: 20px;
    }

    h1 {
      margin: 0;
      color: #800020;
      font-family: 'Pacifico', cursive;
      font-size: clamp(2.2rem, 8vw, 4.5rem);
      line-height: 1.35;
      text-shadow: 0 2px 10px rgba(255,255,255,0.35);
    }

    p {
      margin-top: 18px;
      color: #800020;
      font-size: clamp(1rem, 4vw, 1.4rem);
      font-weight: 700;
    }

    .floating-heart,
    .petal,
    .sparkle,
    .tap-heart {
      position: absolute;
      pointer-events: none;
      user-select: none;
    }

    .floating-heart {
      bottom: -40px;
      font-size: 24px;
      opacity: 0.85;
      animation: floatUp linear infinite;
      z-index: 2;
    }

    .sparkle {
      color: white;
      font-size: 18px;
      animation: twinkle 2s infinite ease-in-out;
      z-index: 1;
    }

    .petal {
      top: -40px;
      font-size: 24px;
      opacity: 0.9;
      animation: fall linear infinite;
      z-index: 1;
    }

    .tap-heart {
      font-size: 26px;
      z-index: 10;
      animation: popHeart 1s ease-out forwards;
    }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0.9;
      }
      100% {
        transform: translateY(-115vh) scale(1.2);
        opacity: 0;
      }
    }

    @keyframes twinkle {
      0%, 100% {
        opacity: 0.25;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.35);
      }
    }

    @keyframes fall {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 0.95;
      }
      100% {
        transform: translateY(115vh) translateX(35px) rotate(220deg);
        opacity: 0;
      }
    }

    @keyframes popHeart {
      0% {
        transform: translate(-50%, -50%) scale(0.4);
        opacity: 1;
      }
      50% {
        transform: translate(-50%, -80%) scale(1.2);
        opacity: 1;
      }
      100% {
        transform: translate(-50%, -140%) scale(1.6);
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 16px;
      }

      .container {
        padding: 14px;
      }

      h1 {
        font-size: clamp(2rem, 9vw, 3.2rem);
      }

      p {
        font-size: clamp(1rem, 4.4vw, 1.2rem);
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>
      Happy Women’s Day<br>
      to the best girlfriend ever<br>
      Jasmine I love you so so much
      And you can't argue with a website so..
      i WIN 
      ❤️❤️❤️❤️❤️❤️❤️❤️❤️❤️
    </h1>
    <p>Tap me Jasmine 💕</p>
  </div>

  <!-- Floating hearts -->
  <div class="floating-heart" style="left: 8%; animation-duration: 6s;">❤️</div>
  <div class="floating-heart" style="left: 24%; animation-duration: 8s;">💗</div>
  <div class="floating-heart" style="left: 42%; animation-duration: 7s;">💖</div>
  <div class="floating-heart" style="left: 63%; animation-duration: 9s;">💕</div>
  <div class="floating-heart" style="left: 82%; animation-duration: 6.5s;">💞</div>

  <!-- Sparkles -->
  <div class="sparkle" style="top: 12%; left: 18%;">✨</div>
  <div class="sparkle" style="top: 24%; left: 82%;">✨</div>
  <div class="sparkle" style="top: 64%; left: 10%;">✨</div>
  <div class="sparkle" style="top: 76%; left: 68%;">✨</div>

  <!-- Rose petals -->
  <div class="petal" style="left: 6%; animation-duration: 9s;">🌹</div>
  <div class="petal" style="left: 18%; animation-duration: 11s;">🌸</div>
  <div class="petal" style="left: 33%; animation-duration: 10s;">🌹</div>
  <div class="petal" style="left: 48%; animation-duration: 12s;">🌸</div>
  <div class="petal" style="left: 64%; animation-duration: 9.5s;">🌹</div>
  <div class="petal" style="left: 79%; animation-duration: 11.5s;">🌸</div>
  <div class="petal" style="left: 91%; animation-duration: 10.5s;">🌹</div>

  <script>
    function createTapHeart(x, y) {
      const hearts = ["❤️", "💖", "💕", "💗", "💞"];
      const heart = document.createElement("div");
      heart.className = "tap-heart";
      heart.textContent = hearts[Math.floor(Math.random() * hearts.length)];
      heart.style.left = x + "px";
      heart.style.top = y + "px";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 1000);
    }

    document.addEventListener("click", function(e) {
      createTapHeart(e.clientX, e.clientY);
    });

    document.addEventListener("touchstart", function(e) {
      const touch = e.touches[0];
      createTapHeart(touch.clientX, touch.clientY);
    }, { passive: true });
  </script>

</body>
</html>
